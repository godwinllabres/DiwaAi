# SonarQube / SonarCloud project config for SeviAI.
# Used by the sonarqube job in .github/workflows/security-scan.yml and by a
# local sonar-scanner run against a self-hosted SonarQube (see
# docs/SECURITY_SCANNING.md).

sonar.projectKey=seviai
sonar.projectName=SeviAI - CvSU Virtual Assistant

sonar.sources=api,scripts,training
sonar.tests=training
sonar.test.inclusions=training/test_*.py,test_*.py

sonar.python.version=3.11

# Skip artifacts, data, and vendored/archived material — scan code only.
sonar.exclusions=\
  archive/**,\
  models/**,\
  data/**,\
  logs/**,\
  notebooks/**,\
  web/**,\
  ref/**,\
  **/__pycache__/**,\
  **/*.pkl,**/*.h5

sonar.sourceEncoding=UTF-8
