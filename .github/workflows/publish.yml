# Build the SeviAI (API) image and publish it to this repo's own GHCR namespace.
# Uses the built-in GITHUB_TOKEN — no cross-repo PAT or org-token approval
# needed. sevi-deploy pulls the published image.
name: Publish api image (GHCR)

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: publish-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner for GHCR
        id: ns
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/Dockerfile.local
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.owner }}/sevi-api:latest
            ghcr.io/${{ steps.ns.outputs.owner }}/sevi-api:${{ github.sha }}
          cache-from: type=gha,scope=sevi-api
          cache-to: type=gha,mode=max,scope=sevi-api

      - name: Summary
        run: |
          {
            echo "### Published"
            echo '```'
            echo "ghcr.io/${{ steps.ns.outputs.owner }}/sevi-api:latest  (+ :${{ github.sha }})"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
