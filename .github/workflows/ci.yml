name: CI

# Builds the local-server Docker image (deployment/Dockerfile.local — the same
# image sevi-deploy's compose stack runs) and validates it: gate test scripts,
# then a live smoke test of the API with the committed models.
#
# Note: Render builds deployment/Dockerfile.render separately. Its pins
# (sklearn 1.3.2 / TF-less) predate the 2026-05 model retrains and cannot load
# the committed models — align requirements_render.txt with
# requirements_local.txt before relying on the NB/NN tiers in production.

on:
  push:
  workflow_dispatch:

concurrency:
  group: seviai-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -f deployment/Dockerfile.local -t sevi-api:ci .

      - name: Gate tests (safety + campus context)
        run: |
          docker run --rm -e LLM_PROVIDER=none sevi-api:ci python test_safety_gate.py
          docker run --rm -e LLM_PROVIDER=none sevi-api:ci python test_campus_context.py

      - name: Start API
        run: docker run -d --name api -p 8000:8000 -e LLM_PROVIDER=none sevi-api:ci

      - name: Wait for health
        run: |
          for i in $(seq 1 60); do
            curl -fsS http://localhost:8000/health && exit 0
            sleep 2
          done
          echo "API never became healthy" >&2
          exit 1

      - name: Smoke test — classifier + NB-tier chat
        run: |
          set -euo pipefail

          health=$(curl -fsS http://localhost:8000/health)
          echo "health: $health"
          echo "$health" | jq -e '.status == "healthy" and .classifier_ready == true'

          chat=$(curl -fsS -X POST http://localhost:8000/chat \
            -H 'Content-Type: application/json' \
            -d '{"message":"Hello DIWA"}')
          echo "chat: $chat"
          # A deterministic tier (retrieval / NB / NN) must answer the greeting,
          # not the LLM fallback or a refusal — CI runs with LLM_PROVIDER=none.
          echo "$chat" | jq -e '.intent == "greeting" and (.source | test("intent_retrieval|naive_bayes|neural_network"))'

          chat=$(curl -fsS -X POST http://localhost:8000/chat \
            -H 'Content-Type: application/json' \
            -d '{"message":"How do I enroll at CvSU?"}')
          echo "$chat" | jq -e '.intent == "enrollment_procedure"'

      - name: Dump logs on failure
        if: failure()
        run: docker logs api || true

      - name: Cleanup
        if: always()
        run: docker rm -f api || true
